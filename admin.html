<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel - RIZZGAME</title>

<link rel="stylesheet" href="form.css">

<style>
button{
    width:100%;
    padding:12px;
    margin-top:8px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}
body{
    background:#0f172a;
    color:white;
    font-family:Poppins,sans-serif;
    padding:20px;
}

.admin-header{
    margin-bottom:20px;
}

.admin-title{
    font-size:28px;
    font-weight:700;
}

#orders-container{
    display:grid;
    gap:16px;
}

.order-card{
    background:#1e293b;
    border-radius:16px;
    padding:16px;
    border:1px solid rgba(255,255,255,.1);
}

.order-card h3{
    margin-bottom:10px;
}

.order-card p{
    margin:6px 0;
}

.status{
    color:#22c55e;
    font-weight:600;
}
</style>
</head>

<body>

<div class="admin-header">
    <div class="admin-title">
        Dashboard Admin RIZZGAME
    </div>
</div>

<div id="orders-container">
    <p>Memuat pesanan...</p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script src="firebase-config.js"></script>
<script src="admin.js"></script>

</body>
</html>
