<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Meta -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>TopUpCode | Form Topup</title>
    <meta name="description" content="Topup game cepat, aman dan terpercaya di TopUpCode.">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <!-- CSS -->
    <link rel="stylesheet" href="form.css">
</head>
<body>

    <!-- =====================================================
         APP WRAPPER
    ====================================================== -->
    <div id="app">

        <!-- =================================================
             HEADER
        ================================================== -->
        <header class="page-header">

            <div class="container">

                <a
                    href="index.html"
                    class="back-button"
                    aria-label="Kembali ke halaman utama"
                >
                    ← Kembali
                </a>

            </div>

        </header>

        <!-- =================================================
             MAIN CONTENT
        ================================================== -->
        <main class="form-page">

            <div class="container">

                <!-- =========================================
                     GAME BANNER
                ========================================== -->
                <section
                    class="game-banner"
                    aria-labelledby="selected-game-title"
                >

                    <div class="game-banner-image-wrapper">

                        <img
                            src="assets/Logo.webp"
                            alt="Banner Game"
                            id="game-banner-image"
                            class="game-banner-image"
                        >

                    </div>

                    <div class="game-banner-content">

                        <div class="banner-heading">

                            <h1
                                id="selected-game-title"
                                class="selected-game-title"
                            >
                                RIZZGAME HUB
                            </h1>

                            <span class="secure-badge">
                                Pembayaran Aman
                            </span>

                        </div>

                        <p class="banner-description">
                            Topup cepat, otomatis, aman dan terpercaya.
                        </p>

                    </div>

                </section>

                <!-- =====================================

                </section>

                <!-- =========================================
                     FORM TOPUP
                ========================================== -->
                <form
                    id="topup-form"
                    class="topup-form"
                    autocomplete="off"
                >

                    <!-- =====================================
                         STEP 1
                    ====================================== -->
                    <section
                        class="form-section"
                        aria-labelledby="step-user"
                    >

                        <div class="section-header">

                            <span class="step-badge">
                            
                            </span>

                            <h2 id="step-user">
                                Masukkan User ID
                            </h2>

                        </div>

                        <div class="form-group">

                            <label for="user-input">
                                User ID / Username
                            </label>

                            <input
                                type="text"
                                id="user-input"
                                name="user-input"
                                placeholder="Masukkan User ID atau Username"
                                required
                            >

                        </div>

                        <div
                            class="game-note"
                            id="game-note"
                        >
                            Untuk Roblox gunakan Username.
                        </div>

                    </section>

                    <!-- =====================================
                         STEP 2
                    ====================================== -->
                    <section
                        class="form-section"
                        aria-labelledby="step-nominal"
                    >

                        <div class="section-header">

                            <span class="step-badge">
                                STEP 2
                            </span>

                            <h2 id="step-nominal">
                                Pilih Nominal
                            </h2>

                        </div>

                        <div
                            id="nominal-grid"
                            class="nominal-grid"
                        >

                            <!-- Diisi form.js sesuai game -->

                        </div>

                    </section>

                    <!-- =====================================
                         STEP 3
                    ====================================== -->
                    <section
                        class="form-section"
                        aria-labelledby="step-payment"
                    >

                        <div class="section-header">

                            <span class="step-badge">
                                STEP 3
                            </span>

                            <h2 id="step-payment">
                                Metode Pembayaran
                            </h2>

                        </div>

                        <div
                            class="payment-grid"
                            id="payment-grid"
                        >

                            <!-- DANA -->
                            <button
                                type="button"
                                class="payment-card"
                                data-payment="DANA"
                            >

                                <img
                                    src="assets/Dana.png"
                                    alt="DANA"
                                >

                                <span>DANA</span>

                            </button>

                        

                            <!-- GOPAY -->
                            <button
                                type="button"
                                class="payment-card"
                                data-payment="GOPAY"
                            >

                                <img
                                    src="assets/gopay.png"
                                    alt="GoPay"
                                >

                                <span>GoPay</span>

                            </button>

                            <!-- QRIS -->
                            <button
                                type="button"
                                class="payment-card"
                                data-payment="ShoopePay"
                            >

                                <img
                                    src="assets/shoope.png"
                                    alt="SPay"
                                >

                                <span>ShoopePay</span>

                            </button>


                        </div>

                    </section>

                    <!-- =====================================
                         ORDER SUMMARY
                    ====================================== -->
                    <aside
                        class="order-summary"
                        aria-labelledby="summary-title"
                    >

                        <div class="summary-header">

                            <h2 id="summary-title">
                                Ringkasan Pesanan
                            </h2>

                        </div>

                        <div class="summary-body">

                            <div class="summary-item">

                                <span>Game</span>

                                <strong id="summary-game">
                                    -
                                </strong>

                            </div>

                            <div class="summary-item">

                                <span>User</span>

                                <strong id="summary-user">
                                    -
                                </strong>

                            </div>

                            <div class="summary-item">

                                <span>Nominal</span>

                                <strong id="summary-nominal">
                                    -
                                </strong>

                            </div>

                            <div class="summary-item">

                                <span>Pembayaran</span>

                                <strong id="summary-payment">
                                    -
                                </strong>

                            </div>

                            <div class="summary-item">

                                <span>Kode Pesanan</span>

                                <strong id="order-code">
                                    XQLTP00000AAAA
                                </strong>

                            </div>

                            <div class="summary-item total">

                                <span>Total Pembayaran</span>

                                <strong id="summary-total">
                                    Rp0
                                </strong>

                            </div>

                        </div>

                    </aside>

                    <!-- =====================================
                         SUBMIT
                    ====================================== -->
                    <section class="submit-section">

                        <button
                            type="submit"
                            id="buy-button"
                            class="buy-button"
                        >
                            Beli Sekarang
                        </button>

                    </section>

                </form>

            </div>

        </main>

    </div>

    <!-- =============================================
         TOAST CONTAINER
    ============================================== -->
    <div
        id="toast-container"
        aria-live="polite"
        aria-atomic="true"
    ></div>

    <!-- =============================================
         JAVASCRIPT
    ============================================== -->
    <script src="https://www.gstatic.com/firebasejs/12.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.0.0/firebase-database-compat.js"></script>

<script src="firebase-config.js"></script>
<script src="form.js"></script>

</body>
</html>
