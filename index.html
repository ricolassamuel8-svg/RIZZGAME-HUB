<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Meta Dasar -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TopUpCode - Topup Game Cepat & Murah untuk Roblox, Free Fire, dan Mobile Legend.">
    <meta name="keywords" content="topup game, roblox, free fire, mobile legend, topup murah, topup cepat">
    <meta name="author" content="TopUpCode">
    <meta name="robots" content="index, follow">

    <!-- Open Graph -->
    <meta property="og:title" content="TopUpCode">
    <meta property="og:description" content="Topup Game Cepat & Murah">
    <meta property="og:type" content="website">
    <meta property="og:image" content="assets/og-image.jpg">

    <!-- Title -->
    <title>RIZZGAME HUB | Topup Game Cepat & Murah</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <!-- Main CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Favicon -->
    <link rel="icon" href="assets/favicon.png" type="image/png">
</head>
<body>

    <!-- =========================================
         LOADING SCREEN
    ========================================== -->
    <div id="loading-screen" aria-label="Loading Screen">
        <div class="loading-wrapper">
            <div class="loading-logo">
                <img src="assets/Logo.webp" alt="Logo TopUpCode">
            </div>

            <h1 class="loading-title">
                RIZZGAME HUB
            </h1>

            <p class="loading-text">
                Memuat layanan topup...
            </p>
        </div>
    </div>

    <!-- =========================================
         MAIN WRAPPER
    ========================================== -->
    <div id="app">

        <!-- =====================================
             HEADER
        ====================================== -->
        <header class="site-header">
            <div class="container">

                <div class="brand-area">
                    <a href="/" class="brand-link" aria-label="RIZZGAME HUB">
                        <img
                            src="assets/Logo.webp"
                            alt="Logo RIZZGAME HUB"
                            class="brand-logo"
                        >

                        <div class="brand-text">
                            <h1 class="site-title">
                                RIZZGAME HUB
                            </h1>

                            <p class="site-subtitle">
                                Topup Game Cepat &amp; Murah
                            </p>
                        </div>
                    </a>
                </div>

            </div>
        </header>

        <!-- =====================================
             MAIN CONTENT
        ====================================== -->
        <main class="main-content">

            <section
                class="games-section"
                aria-labelledby="games-heading"
            >

                <div class="container">

                    <header class="section-header">
                        <h2 id="games-heading">
                            Pilih Game Favoritmu
                        </h2>

                        <p>
                            Layanan topup instan untuk game populer.
                        </p>
                    </header>

                    <!-- =================================
                         GAME GRID
                    ================================== -->
                    <div
                        class="games-grid"
                        role="list"
                        aria-label="Daftar Game"
                    >

                        <!-- ROBLOX -->
                        <article
                            class="game-card"
                            data-game="ROBLOX"
                            role="listitem"
                        >
                            <a
                                href="#"
                                class="game-card-link"
                                aria-label="Topup Roblox"
                            >

                                <figure class="game-image-wrapper">
                                    <img
                                        src="assets/roblox.png"
                                        alt="Roblox"
                                        class="game-image"
                                        loading="lazy"
                                    >
                                </figure>

                                <div class="game-content">
                                    <h3 class="game-title">
                                        ROBLOX
                                    </h3>

                                    <p class="game-description">
                                        Topup Robux cepat dan aman.
                                    </p>
                                </div>

                            </a>
                        </article>

                        <!-- FREE FIRE -->
                        <article
                            class="game-card"
                            data-game="FREEFIRE"
                            role="listitem"
                        >
                            <a
                                href="#"
                                class="game-card-link"
                                aria-label="Topup Free Fire"
                            >

                                <figure class="game-image-wrapper">
                                    <img
                                        src="assets/ff.jpeg"
                                        alt="Free Fire"
                                        class="game-image"
                                        loading="lazy"
                                    >
                                </figure>

                                <div class="game-content">
                                    <h3 class="game-title">
                                        FREEFIRE
                                    </h3>

                                    <p class="game-description">
                                        Diamond Free Fire harga terbaik.
                                    </p>
                                </div>

                            </a>
                        </article>

                        <!-- MOBILE LEGEND -->
                        <article
                            class="game-card"
                            data-game="MOBILE LEGEND"
                            role="listitem"
                        >
                            <a
                                href="#"
                                class="game-card-link"
                                aria-label="Topup Mobile Legend"
                            >

                                <figure class="game-image-wrapper">
                                    <img
                                        src="assets/ml.png.jpg"
                                        alt="Mobile Legend"
                                        class="game-image"
                                        loading="lazy"
                                    >
                                </figure>

                                <div class="game-content">
                                    <h3 class="game-title">
                                        MOBILE LEGEND
                                    </h3>

                                    <p class="game-description">
                                        Topup Diamond Mobile Legend instan.
                                    </p>
                                </div>

                            </a>
                        </article>

                    </div>

                </div>

            </section>

        </main>

    </div>

    <!-- =========================================
         TOAST NOTIFICATION CONTAINER
    ========================================== -->
    <div
        id="toast-container"
        aria-live="polite"
        aria-atomic="true"
    ></div>

    <!-- =========================================
         JAVASCRIPT
    ========================================== -->
    <script src="script.js"></script>

</body>
</html>
